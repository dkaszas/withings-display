<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Command Center</title>
    <meta http-equiv="refresh" content="3600">
    <style>
        body {
            background-color: #0d1117;
            color: white;
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh; /* Changed: allows the page to grow beyond the screen */
            /* Removed the 'overflow: hidden' lock */
        }
        .nav {
            display: flex;
            gap: 20px;
            padding: 15px 0;
            width: 100%;
            justify-content: center;
            position: sticky; /* Keeps the buttons visible when you scroll */
            top: 0;
            background-color: #0d1117; /* Matches background so it hides the chart scrolling under it */
            z-index: 100;
            box-shadow: 0 4px 6px -6px #222; /* Adds a tiny shadow below the buttons */
        }
        button {
            background-color: #30363d;
            color: #c9d1d9;
            border: 1px solid #444c56;
            padding: 12px 24px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        button.active {
            background-color: #2ea043;
            color: white;
            border-color: #2ea043;
        }
        .img-container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Changed: aligns the image to the top instead of middle */
            width: 100%;
            padding-bottom: 40px; /* Added some padding so it doesn't hit the absolute bottom */
        }
        img {
            max-width: 100%;
            height: auto; /* Changed: lets the image retain its natural height */
            display: none; 
        }
        img.active {
            display: block; 
        }
    </style>
</head>
<body>

    <div class="nav">
        <button id="btn-live" class="active" onclick="switchTab('live')">60-Day Live</button>
        <button id="btn-archive" onclick="switchTab('archive')">Full Archive</button>
    </div>

    <div class="img-container">
        <img id="img-live" class="active" alt="60-Day Dashboard">
        <img id="img-archive" alt="Archival Dashboard">
    </div>

    <script>
        const cacheBuster = '?v=' + new Date().getTime();
        document.getElementById('img-live').src = 'dashboard.png' + cacheBuster;
        document.getElementById('img-archive').src = 'archive_dashboard.png' + cacheBuster;

        function switchTab(tab) {
            if (tab === 'live') {
                document.getElementById('img-live').classList.add('active');
                document.getElementById('img-archive').classList.remove('active');
                document.getElementById('btn-live').classList.add('active');
                document.getElementById('btn-archive').classList.remove('active');
            } else {
                document.getElementById('img-archive').classList.add('active');
                document.getElementById('img-live').classList.remove('active');
                document.getElementById('btn-archive').classList.add('active');
                document.getElementById('btn-live').classList.remove('active');
            }
        }
    </script>

</body>
</html>
