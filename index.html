<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Dashboard</title>
    <style>
        body { background-color: #0d1117; color: white; font-family: sans-serif; margin: 0; padding: 20px; text-align: center; }
        .nav { margin-bottom: 20px; }
        button { background: #30363d; color: white; border: 1px solid #444c56; padding: 10px 20px; margin: 5px; cursor: pointer; border-radius: 6px; font-size: 16px; }
        button.active { background: #238636; border-color: #2ea043; }
        img { max-width: 100%; height: auto; display: none; margin: 0 auto; border-radius: 8px; }
        img.active { display: block; }
    </style>
</head>
<body>

    <div class="nav">
        <button id="btn-daily" class="active" onclick="show('daily')">Daily View</button>
        <button id="btn-archive" onclick="show('archive')">Historical Archive</button>
    </div>

    <div class="container">
        <img id="img-daily" src="dashboard.png" class="active">
        <img id="img-archive" src="archive_dashboard.png">
    </div>

    <script>
        function show(type) {
            // Reset buttons
            document.querySelectorAll('button').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('img').forEach(img => img.classList.remove('active'));

            // Set active
            document.getElementById('btn-' + type).classList.add('active');
            document.getElementById('img-' + type).classList.add('active');
        }

        // Auto-refresh images every 30 mins to keep tablet fresh
        setInterval(() => {
            const timestamp = new Date().getTime();
            document.getElementById('img-daily').src = 'dashboard.png?t=' + timestamp;
            document.getElementById('img-archive').src = 'archive_dashboard.png?t=' + timestamp;
        }, 1800000);
    </script>
</body>
</html>
