<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MacroLens LCARS</title>
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css?v=11">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
</head>
<body>
    
    <div id="settings-btn" class="settings-icon" aria-label="Settings">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path><circle cx="12" cy="12" r="3"></circle></svg>
    </div>

    <div id="app" class="lcars-app">
        <!-- LCARS LEFT PILLAR -->
        <div class="lcars-column">
            <div class="lcars-bar lcars-bar-top bg-peach">47</div>
            <div class="lcars-bar lcars-bar-standard bg-blue">01</div>
            <div class="lcars-bar lcars-bar-standard bg-purple">02</div>
            <div class="lcars-bar lcars-bar-stretch bg-orange">03</div>
            <div class="lcars-bar lcars-bar-standard bg-tan">04</div>
            <div class="lcars-bar lcars-bar-stretch bg-red">05</div>
        </div>

        <!-- MAIN INTERFACE -->
        <div class="lcars-main">
            <!-- HEADER WRAPPER -->
            <div class="lcars-header">
                <div class="lcars-top-elbow"></div>
                <a href="https://dkaszas.github.io/withings/" target="_blank" class="lcars-top-pill">TRICORDER</a>
            </div>
            
            <div class="lcars-title">MACROLENS</div>

            <!-- CAMERA/GALLERY SENSOR BLOCK -->
            <div class="camera-wrapper">
                <img id="image-preview" style="display: none;" />
                <div class="camera-placeholder" id="camera-placeholder">
                    <div class="input-split">
                        <label for="gallery-input" class="split-btn split-top">GALLERY</label>
                        <label for="camera-input" class="split-btn split-bottom">SENSOR</label>
                    </div>
                </div>
                <input type="file" id="gallery-input" accept="image/*" multiple style="display:none;">
                <input type="file" id="camera-input" accept="image/*" capture="environment" style="display:none;">
            </div>
            <div id="image-count-badge" class="hidden" style="color:var(--lcars-peach); text-align:right;"></div>

            <!-- OVERRIDE FIELD -->
            <textarea id="context-input" placeholder="OVERRIDE CONTEXT..." rows="2"></textarea>
            
            <!-- ACTION BUTTON -->
            <button id="analyze-btn" class="lcars-btn bg-purple" disabled>ENGAGE ANALYSIS</button>

            <!-- RESULTS OVERLAY -->
            <div id="results-card" class="hidden">
                <div class="lcars-data-block">
                    <div class="confidence-badge" id="res-confidence">CONFIDENCE: --</div>
                    <div class="food-items-text" id="res-food-items">...</div>
                </div>

                <div class="macro-grid">
                    <div class="macro-item bg-orange"><span class="label">CALORIES</span><span class="value" id="res-cals">--</span></div>
                    <div class="macro-item bg-blue"><span class="label">PROTEIN</span><span class="value" id="res-pro">--</span></div>
                    <div class="macro-item bg-peach"><span class="label">CARBS</span><span class="value" id="res-carb">--</span></div>
                    <div class="macro-item bg-purple"><span class="label">FAT</span><span class="value" id="res-fat">--</span></div>
                </div>
                
                <button id="commit-btn" class="lcars-btn btn-commit">TRANSMIT TO DATABANK</button>
                <button id="cancel-btn" class="lcars-btn btn-cancel" style="border-radius: 10px; height: 35px; font-size:16px;">ABORT</button>
            </div>
        </div>
    </div>

    <!-- UTILITY MODALS -->
    <div id="loader" class="hidden">
        <div id="loader-text">ACCESSING DATABANK...</div>
    </div>

    <div id="settings-modal" class="hidden">
        <div class="modal-content">
            <h2 style="color:var(--lcars-orange)">SYSTEM CONFIG</h2>
            <input type="password" id="gemini-key" placeholder="AI SUBSYSTEM KEY">
            <input type="password" id="github-pat" placeholder="DATABANK PAT">
            <input type="text" id="github-repo" value="dkaszas/withings" placeholder="DATABANK ID">
            <button id="save-settings-btn" class="lcars-btn bg-blue">SAVE</button>
            <button id="close-settings-btn" class="lcars-btn bg-red">CLOSE</button>
        </div>
    </div>

    <script src="app.js?v=11"></script>
</body>
</html>
