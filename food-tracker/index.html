<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MacroLens LCARS</title>
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css?v=86">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🖖</text></svg>">
</head>
<body>
    
    <div id="app" class="lcars-app">
        <!-- LCARS LEFT PILLAR -->
        <div class="lcars-column" style="text-align: right; font-weight: bold; font-family: 'Oswald', sans-serif;">
            <div id="settings-btn" class="lcars-bar lcars-bar-top bg-peach" style="cursor: pointer; justify-content: flex-end;">47</div>
            <div id="pillar-bar-1" class="lcars-bar lcars-bar-standard bg-blue" style="cursor: pointer; justify-content: flex-end;">GALLERY</div>
            <div id="pillar-bar-2" class="lcars-bar lcars-bar-standard bg-purple" style="cursor: pointer; justify-content: flex-end;">SENSOR</div>
            <div id="pillar-bar-3" class="lcars-bar lcars-bar-stretch bg-cyan" style="cursor: pointer; justify-content: flex-end;">ANALYZE</div>
            <div id="pillar-bar-4" class="lcars-bar lcars-bar-standard bg-peach" style="cursor: pointer; justify-content: flex-end;">COMMIT</div>
            <div id="pillar-bar-5" class="lcars-bar lcars-bar-stretch bg-red" style="cursor: pointer; justify-content: flex-end;">ABORT</div>
        </div>

        <!-- MAIN INTERFACE -->
        <div class="lcars-main">
            <!-- HEADER WRAPPER -->
            <div class="lcars-header">
                <div id="sports-nav-btn" class="lcars-top-elbow" style="cursor: pointer; background-color: var(--lcars-gold) !important; color: #000;">ACTIVITY LOG</div>
                <div id="databank-nav-btn" class="lcars-top-pill" style="cursor: pointer; background-color: var(--lcars-dark-orange);">DATABANK</div>
                <div id="nav-btn" class="lcars-top-pill" style="cursor: pointer; background-color: var(--lcars-teal);">TRICORDER</div>
            </div>
            
            <!-- SCANNER VIEW -->
            <div id="scanner-view">

            <!-- CAMERA/GALLERY SENSOR BLOCK -->
            <div class="camera-wrapper">
                <div id="image-count-badge" class="hidden" style="position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.8); color: var(--lcars-peach); padding: 5px 10px; border-radius: 10px; font-size: 14px; font-weight: bold; z-index: 10;"></div>
                <img id="image-preview" class="hidden" />
                <div class="camera-placeholder" id="camera-placeholder">
                    <div class="input-split">
                        <label for="gallery-input" class="split-btn split-top bg-blue" style="cursor: pointer;">GALLERY</label>
                        <label for="camera-input" class="split-btn split-bottom bg-purple" style="cursor: pointer;">SENSOR</label>
                    </div>
                </div>
                <input type="file" id="gallery-input" accept="image/*" multiple style="display:none;">
                <input type="file" id="camera-input" accept="image/*" capture="environment" style="display:none;">
            </div>

            <!-- OVERRIDE FIELD -->
            <textarea id="context-input" placeholder="OVERRIDE CONTEXT:" rows="2"></textarea>
            
            <!-- MODEL SELECTOR -->
            <div class="model-select">
                <div class="model-btn active" id="btn-flash">MODEL: FLASH</div>
                <div class="model-btn" id="btn-pro">MODEL: PRO</div>
            </div>
            
            <!-- ACTION BUTTON -->
            <button id="analyze-btn" class="lcars-btn bg-cyan hidden">ENGAGE ANALYSIS</button>

            <!-- RESULTS OVERLAY -->
            <div id="results-card" class="hidden">
                <button id="commit-btn" class="lcars-btn btn-commit">TRANSMIT TO DATABANK</button>

                <div class="lcars-data-block">
                    <div class="confidence-badge" id="res-confidence">CONFIDENCE: --</div>
                    <div class="food-items-text" id="res-food-items">...</div>
                </div>

                <div class="macro-grid">
                    <div class="macro-item bg-orange"><span class="label">CALORIES</span><span class="value" id="res-cals">--</span></div>
                    <div class="macro-item bg-blue"><span class="label">PROTEIN</span><span class="value" id="res-pro">--</span></div>
                    <div class="macro-item bg-peach"><span class="label">CARBS</span><span class="value" id="res-carb">--</span></div>
                    <div class="macro-item bg-purple"><span class="label">FAT</span><span class="value" id="res-fat">--</span></div>
                </div>
                
                <button id="cancel-btn" class="lcars-btn btn-cancel bg-red">ABORT</button>
            </div>

            </div> <!-- END SCANNER VIEW -->

            <!-- DATABANK VIEW -->
            <div id="databank-view" class="hidden" style="margin-top: 15px;">
                <div class="lcars-bar lcars-bar-standard bg-tan omni-title" style="margin-bottom: 10px;">MEDICAL DATABASE UPLINK</div>
                <textarea id="omni-input" placeholder="QUERY INTERACTIVE DATABANK..." rows="4"></textarea>
                <button id="omni-btn" class="lcars-btn bg-dark-orange" style="margin-top: 10px;">TRANSMIT SECURE QUERY</button>
                <div id="omni-response" class="omni-response hidden" style="margin-top: 10px;"></div>
            </div>

            <!-- TRICORDER VIEW -->
            <div id="tricorder-view" class="hidden" style="margin-top: 15px;">
                <div class="tricorder-image-wrapper">
                    <img src="https://raw.githubusercontent.com/dkaszas/withings-display/refs/heads/main/dashboard.png?v=86latest" alt="Health Dashboard" />
                </div>
                <div id="diagnostic-footer" class="diagnostic-footer hidden">
                    <!-- populated via javascript -->
                </div>
            </div>

            <!-- SPORTS VIEW -->
            <div id="sports-view" class="hidden">
                <div style="display: flex; gap: 10px; margin-bottom: 10px; align-items: center;">
                    <label style="color: var(--lcars-cyan); font-size: 14px; min-width: 80px;">LOCAL TIME:</label>
                    <input type="datetime-local" id="sport-time" style="flex-grow: 1; padding: 8px; background: #000; color: var(--lcars-cyan); border: 2px solid var(--lcars-cyan); border-radius: 10px; font-family: 'Oswald', sans-serif; font-size: 14px;">
                </div>

                <select id="sport-select" class="lcars-select" style="width: 100%; margin-bottom: 10px; padding: 10px; background: #000; color: var(--lcars-gold); border: 2px solid var(--lcars-gold); border-radius: 10px; font-family: 'Oswald', sans-serif; font-size: 16px;">
                    <option value="" disabled selected>SELECT ACTIVITY...</option>
                    <option value="pilates">PILATES</option>
                    <option value="running">RUNNING</option>
                    <option value="gym">GYM / STRENGTH</option>
                    <option value="cycling">CYCLING</option>
                    <option value="swim">SWIMMING</option>
                    <option value="cc_ski">CROSS COUNTRY SKI</option>
                </select>

                <div id="sport-dynamic-inputs" style="margin-bottom: 10px; display: flex; flex-direction: column; gap: 5px;"></div>

                <textarea id="sport-context" placeholder="FREEFORM CONTEXT (E.G. 'felt tired', 'pb on bench')" rows="2" style="width: 100%; margin-bottom: 10px; padding: 10px; background: #000; color: var(--lcars-gold); border: 2px solid var(--lcars-gold); border-radius: 10px; font-family: 'Oswald', sans-serif; font-size: 14px;"></textarea>

                <button id="sport-submit-btn" class="lcars-btn bg-blue" style="margin-bottom: 10px;">TRANSMIT ACTIVITY DATA</button>
                <button id="sport-clear-btn" class="lcars-btn bg-red" style="margin-bottom: 20px;">CLEAR DATA</button>

                <div class="tricorder-image-wrapper">
                    <img src="https://raw.githubusercontent.com/dkaszas/withings-display/refs/heads/main/sports_dashboard.png?v=86latest" alt="Sports Dashboard" onerror="this.style.display='none'" onload="this.style.display='block'" />
                </div>
            </div>

        </div>
    </div>

    <!-- UTILITY MODALS -->
    <div id="loader" class="hidden">
        <div id="loader-text">ACCESSING DATABANK...</div>
    </div>

    <div id="settings-modal" class="hidden">
        <div class="modal-content">
            <h2 style="color:var(--lcars-orange)">SYSTEM CONFIG</h2>
            <input type="password" id="gemini-key" placeholder="AI SUBSYSTEM KEY">
            <input type="password" id="github-pat" placeholder="DATABANK PAT">
            <input type="text" id="github-repo" value="dkaszas/withings" placeholder="DATABANK ID">
            <button id="save-settings-btn" class="lcars-btn bg-blue">SAVE</button>
            <button id="close-settings-btn" class="lcars-btn bg-red">CLOSE</button>
        </div>
    </div>

    <script src="app.js?v=86"></script>
</body>
</html>
